<svg xmlns="http://www.w3.org/2000/svg" viewBox="-5 -5 110 120">
  <!--
    Sales Voice — S geométrica.
    Dos arcos cúbicos con linecap="butt" crean los cortes diagonales
    característicos del logo de Sales Hacking:
      • Primer arco: desde top-right, barre a la IZQUIERDA rodeando el
        loop superior, llega al centro.
      • Segundo arco: desde el centro, barre a la DERECHA rodeando el
        loop inferior, acaba en bottom-left.
    Los extremos con butt cap producen los cortes angulares en diagonal.
  -->
  <rect x="-5" y="-5" width="110" height="120" fill="#0a0a0a"/>
  <path
    d="M 72,14 C 8,14 8,55 50,55 C 92,55 92,96 28,96"
    fill="none"
    stroke="#C8001A"
    stroke-width="26"
    stroke-linecap="butt"
  />
</svg>
